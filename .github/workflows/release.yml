name: Build & Release APK

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Extract version from build.gradle.kts
        id: version
        run: |
          VERSION=$(grep 'versionName' app/build.gradle.kts | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check if tag exists
        id: check_tag
        run: |
          if git rev-parse "${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Gradle
        if: steps.check_tag.outputs.exists == 'false'
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        if: steps.check_tag.outputs.exists == 'false'
        run: chmod +x gradlew

      - name: Build Release APK
        if: steps.check_tag.outputs.exists == 'false'
        run: ./gradlew assembleRelease

      - name: Rename APK
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          APK=$(find app/build/outputs/apk/release -name '*.apk' | head -1)
          cp "$APK" app/build/outputs/apk/release/AvocorCommanderRooms.apk

      - name: Create GitHub Release
        if: steps.check_tag.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: Avocor Commander Android v${{ steps.version.outputs.version }}
          files: app/build/outputs/apk/release/AvocorCommanderRooms.apk
          generate_release_notes: true
